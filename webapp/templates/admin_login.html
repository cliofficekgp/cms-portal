<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — CMS Crew Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.15); }
        .input-field { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.2); color: white; transition: all 0.3s ease; }
        .input-field::placeholder { color: rgba(255,255,255,0.4); }
        .input-field:focus { outline: none; border-color: #818cf8; background: rgba(255,255,255,0.12); box-shadow: 0 0 0 3px rgba(129,140,248,0.25); }
        .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(99,102,241,0.5); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center" style="background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);">
    <div class="w-full max-w-md px-6">
        <div class="glass rounded-2xl p-8 shadow-2xl">
            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4" style="background: linear-gradient(135deg, #6366f1, #8b5cf6)">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-white">Admin Login</h1>
                <p class="text-sm text-indigo-300 mt-1">CMS Crew Management Portal</p>
            </div>

            {% if error %}
            <div class="mb-5 px-4 py-3 rounded-lg bg-red-900/40 border border-red-500/40 text-red-300 text-sm">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/admin/login" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-indigo-200 mb-2">Username</label>
                    <input type="text" name="username" id="username" required placeholder="Enter username"
                           class="input-field w-full px-4 py-3 rounded-xl text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-indigo-200 mb-2">Password</label>
                    <input type="password" name="password" id="password" required placeholder="Enter password"
                           class="input-field w-full px-4 py-3 rounded-xl text-sm">
                </div>
                <button type="submit" id="login-btn" class="btn-primary w-full py-3 px-6 rounded-xl font-semibold text-white text-sm mt-2">
                    Sign In →
                </button>
            </form>

            <div class="mt-6 flex items-center justify-between text-sm">
                <a href="/admin/forgot_password" class="text-indigo-300 hover:text-indigo-100 transition-colors">Forgot Password?</a>
                <a href="/admin/signup" class="text-indigo-300 hover:text-indigo-100 transition-colors">Create Account</a>
            </div>
            <div class="mt-4 text-center">
                <a href="/" class="text-xs text-gray-500 hover:text-gray-400 transition-colors">← Back to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
