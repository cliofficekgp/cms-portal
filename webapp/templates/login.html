<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS Crew Portal — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .bg-gradient {
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
    }
  </style>
</head>
<body class="bg-gradient min-h-screen flex items-center justify-center p-4">

  <div class="max-w-md w-full bg-white/10 backdrop-blur-lg rounded-2xl shadow-2xl overflow-hidden border border-white/20 p-8">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-500/20 mb-4">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none" class="text-blue-400">
            <circle cx="18" cy="18" r="16" stroke="currentColor" stroke-width="2"/>
            <path d="M10 26 L10 10 L26 10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <rect x="14" y="14" width="10" height="10" rx="1.5" fill="currentColor"/>
            <circle cx="18" cy="19" r="2" fill="#0f172a"/>
          </svg>
        </div>
        <h1 class="text-3xl font-bold text-white tracking-tight">CMS Crew Portal</h1>
        <p class="text-blue-200 mt-2">KGP Division — South Eastern Railway</p>
      </div>

      <form action="/crew_login" method="POST" class="space-y-6" onsubmit="return validateCrewId()">
        {% if error %}
        <div class="bg-red-500/10 border border-red-500/50 text-red-200 p-4 rounded-lg text-sm text-center">
            {{ error }}
        </div>
        {% endif %}

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Crew ID</label>
          <!-- Hidden combined crew_id submitted to server -->
          <input type="hidden" name="crew_id" id="crew_id">

          <div class="flex items-stretch gap-2">
            <!-- Lobby Dropdown -->
            <div class="relative w-40 flex-shrink-0" id="lobby-dropdown-wrap">
              <select id="lobby_select"
                class="block w-full h-full py-3 pl-3 pr-8 border border-gray-600 rounded-lg bg-gray-800/50 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all appearance-none text-sm"
                onchange="handleLobbyChange()">
                <option value="">-- Lobby --</option>
                <option value="TPKR">TPKR</option>
                <option value="SRC">SRC</option>
                <option value="ADL">ADL</option>
                <option value="HDCB">HDCB</option>
                <option value="PKU">PKU</option>
                <option value="MCA">MCA</option>
                <option value="KGP">KGP</option>
                <option value="NMP">NMP</option>
                <option value="GTS">GTS</option>
                <option value="BLS">BLS</option>
                <option value="OTHER">OTHER…</option>
              </select>
              <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-2 text-gray-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
              </div>
            </div>

            <!-- "OTHER" text box (hidden by default) -->
            <input type="text" id="lobby_other"
              class="hidden w-40 flex-shrink-0 py-3 px-3 border border-yellow-500 rounded-lg bg-gray-800/50 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-yellow-400 transition-all uppercase text-sm"
              placeholder="TYPE LOBBY"
              maxlength="10"
              autocomplete="off"
              oninput="this.value=this.value.toUpperCase(); buildCrewId()"
            >

            <!-- 4-digit number -->
            <input type="text" id="crew_number"
              class="flex-1 py-3 px-3 border border-gray-600 rounded-lg bg-gray-800/50 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm font-mono tracking-widest"
              placeholder="0000"
              maxlength="4"
              inputmode="numeric"
              autocomplete="off"
              required
              oninput="this.value=this.value.replace(/\D/g,'').slice(0,4); buildCrewId()"
            >
          </div>

          <!-- Preview -->
          <p class="mt-2 text-xs text-blue-300 font-mono" id="crew_id_preview">&nbsp;</p>
        </div>

        <script>
          function handleLobbyChange() {
            const sel = document.getElementById('lobby_select');
            const otherBox = document.getElementById('lobby_other');
            if (sel.value === 'OTHER') {
              otherBox.classList.remove('hidden');
              otherBox.focus();
            } else {
              otherBox.classList.add('hidden');
              otherBox.value = '';
            }
            buildCrewId();
          }

          function buildCrewId() {
            const sel = document.getElementById('lobby_select');
            const otherBox = document.getElementById('lobby_other');
            const numBox = document.getElementById('crew_number');
            const hiddenInput = document.getElementById('crew_id');
            const preview = document.getElementById('crew_id_preview');

            const lobby = sel.value === 'OTHER' ? otherBox.value.trim() : sel.value;
            const num = numBox.value.trim();

            if (lobby && num) {
              const fullId = lobby + num;
              hiddenInput.value = fullId;
              preview.textContent = 'Crew ID: ' + fullId;
            } else {
              hiddenInput.value = '';
              preview.textContent = '\u00a0';
            }
          }
        </script>

        <button type="submit" class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 focus:ring-offset-gray-900 transition-colors">
          <span>Continue</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="ml-2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
        <!-- Validation Error (JS) -->
        <p id="crew_id_error" class="text-red-400 text-xs text-center hidden">Please select a Lobby and enter a 4-digit number.</p>

        <script>
          // Prevent submit if crew_id is not fully built
          function validateCrewId() {
            const val = document.getElementById('crew_id').value;
            const err = document.getElementById('crew_id_error');
            const sel = document.getElementById('lobby_select');
            const num = document.getElementById('crew_number').value;
            const other = document.getElementById('lobby_other').value;

            const lobby = sel.value === 'OTHER' ? other.trim() : sel.value;
            if (!lobby || num.length !== 4) {
              err.classList.remove('hidden');
              return false;
            }
            err.classList.add('hidden');
            return true;
          }
        </script>
      </form>

      <p class="mt-8 text-center text-sm text-gray-400">
        Select Lobby → Enter 4-digit number → Continue
      </p>
  </div>

</body>
</html>
