<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS Portal — Choose Role</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .bg-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); }
  </style>
</head>
<body class="bg-gradient min-h-screen flex items-center justify-center p-4">

  <div class="max-w-3xl w-full">
    <div class="text-center mb-12">
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-blue-500/20 mb-6 border-2 border-blue-400/30">
          <svg width="40" height="40" viewBox="0 0 36 36" fill="none" class="text-blue-400">
            <circle cx="18" cy="18" r="16" stroke="currentColor" stroke-width="2"/>
            <path d="M10 26 L10 10 L26 10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <rect x="14" y="14" width="10" height="10" rx="1.5" fill="currentColor"/>
            <circle cx="18" cy="19" r="2" fill="#0f172a"/>
          </svg>
        </div>
        <h1 class="text-4xl font-extrabold text-white tracking-tight">CMS Crew Monitor</h1>
        <p class="text-blue-200 mt-3 text-base font-light">Crew Detection • Train Mapping • Duty Hour Monitoring</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- Crew Card -->
        <a href="/crew_login" class="group block bg-white/10 hover:bg-white/15 backdrop-blur-lg rounded-2xl border border-white/20 p-8 transition-all duration-300 hover:scale-[1.02] hover:shadow-2xl hover:shadow-blue-500/20 text-center cursor-pointer">
            <div class="bg-blue-500/20 rounded-xl w-16 h-16 flex items-center justify-center mx-auto mb-6 group-hover:bg-blue-500/30 transition-colors">
                <svg class="w-8 h-8 text-blue-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2">Crew Portal</h2>
            <p class="text-blue-200 text-sm">Login with your Crew ID to submit your duty report.</p>
        </a>

        <!-- Admin Card -->
        <a href="/admin" class="group block bg-white/10 hover:bg-white/15 backdrop-blur-lg rounded-2xl border border-white/20 p-8 transition-all duration-300 hover:scale-[1.02] hover:shadow-2xl hover:shadow-indigo-500/20 text-center cursor-pointer">
            <div class="bg-indigo-500/20 rounded-xl w-16 h-16 flex items-center justify-center mx-auto mb-6 group-hover:bg-indigo-500/30 transition-colors">
                <svg class="w-8 h-8 text-indigo-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2">Admin Dashboard</h2>
            <p class="text-indigo-200 text-sm">Monitor scraper status, handle captchas, and view crew list.</p>
        </a>

    </div>
  </div>

</body>
</html>
