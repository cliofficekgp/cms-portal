<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password — CMS Crew Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.15); }
        .input-field { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.2); color: white; transition: all 0.3s ease; }
        .input-field::placeholder { color: rgba(255,255,255,0.4); }
        .input-field:focus { outline: none; border-color: #f43f5e; background: rgba(255,255,255,0.12); box-shadow: 0 0 0 3px rgba(244,63,94,0.25); }
        .btn-primary { background: linear-gradient(135deg, #e11d48 0%, #f43f5e 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(244,63,94,0.4); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center" style="background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);">
    <div class="w-full max-w-md px-6">
        <div class="glass rounded-2xl p-8 shadow-2xl">
            <div class="text-center mb-7">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4" style="background: linear-gradient(135deg, #e11d48, #f43f5e)">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-white">Change Password</h1>
                <p class="text-sm text-rose-300 mt-1">You must set a new password to continue</p>
            </div>

            <div class="mb-5 px-4 py-3 rounded-lg bg-yellow-900/30 border border-yellow-600/30 text-yellow-300 text-sm">
                ⚠️ Your password has been reset by an administrator. Please choose a new secure password.
            </div>

            {% if error %}
            <div class="mb-5 px-4 py-3 rounded-lg bg-red-900/40 border border-red-500/40 text-red-300 text-sm">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/admin/change_password" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-rose-200 mb-2">New Password</label>
                    <input type="password" name="new_password" id="change-password" required minlength="6" placeholder="Minimum 6 characters"
                           class="input-field w-full px-4 py-3 rounded-xl text-sm">
                </div>
                <button type="submit" id="change-password-btn" class="btn-primary w-full py-3 px-6 rounded-xl font-semibold text-white text-sm">
                    Set New Password →
                </button>
            </form>
        </div>
    </div>
</body>
</html>
